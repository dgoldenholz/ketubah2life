<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gideon's Great Ketubot</title>
    <link rel="stylesheet" href="styles.css?v=20260617">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#top" aria-label="Gideon's Great Ketubot home">
        <span class="brand-mark" aria-hidden="true">G</span>
        <span>Gideon's Great Ketubot</span>
      </a>
      <nav class="nav" aria-label="Primary navigation">
        <a href="#finder">Finder</a>
        <a href="#gallery">Gallery</a>
      </nav>
    </header>

    <main id="top">
      <section class="finder-band" id="finder" aria-labelledby="finder-title">
        <div class="finder-copy">
          <p class="eyebrow">Interactive style finder</p>
          <h1 id="finder-title">Gideon's Great Ketubot</h1>
          <p class="intro">Choose the visual direction that feels right for the couple.</p>
        </div>

        <section class="quiz-panel" aria-live="polite">
          <div class="quiz-status">
            <span id="question-count">Question 1 of 4</span>
            <div class="progress-track" aria-hidden="true">
              <span id="progress-bar"></span>
            </div>
          </div>
          <h2 id="question-title"></h2>
          <div class="option-grid" id="option-grid"></div>
          <div class="quiz-actions">
            <button class="text-button" id="back-button" type="button">Back</button>
            <button class="text-button" id="reset-button" type="button">Reset</button>
          </div>
        </section>

        <section class="results-panel" aria-labelledby="results-title">
          <div class="results-heading">
            <p class="eyebrow">Recommended examples</p>
            <h2 id="results-title">Best matches</h2>
          </div>
          <div class="selection-trail" id="selection-trail"></div>
          <div class="recommendations" id="recommendations"></div>
        </section>
      </section>

      <section class="gallery-band" id="gallery" aria-labelledby="gallery-title">
        <div class="section-heading">
          <p class="eyebrow">Gallery</p>
          <h2 id="gallery-title">Browse all styles</h2>
        </div>
        <div class="filter-row" id="filter-row" aria-label="Gallery filters"></div>
        <div class="gallery-grid" id="gallery-grid"></div>
      </section>
    </main>

    <dialog class="preview-dialog" id="preview-dialog" aria-labelledby="preview-title">
      <button class="close-button" id="close-preview" type="button" aria-label="Close preview">×</button>
      <img id="preview-image" alt="">
      <div class="preview-copy">
        <h2 id="preview-title"></h2>
        <p id="preview-description"></p>
      </div>
    </dialog>

    <script src="data/gallery.js?v=20260617"></script>
    <script src="app.js?v=20260617"></script>
  </body>
</html>
